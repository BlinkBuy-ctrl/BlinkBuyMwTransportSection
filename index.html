<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <title>TransportMW — Find Taxis, Motorcycles & Hire Cars in Malawi</title>
    <meta name="description" content="Malawi's trusted transport hub. Book taxis, motorcycles, minibuses, hire cars and airport transfers across Lilongwe, Blantyre, Mzuzu and beyond. No account needed." />
    <meta name="keywords" content="taxi Malawi, transport Lilongwe, hire car Blantyre, motorcycle Malawi, minibus Mzuzu, airport transfer Malawi, TransportMW" />
    <meta name="theme-color" content="#0a1628" />
    <meta name="robots" content="index, follow" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TransportMW" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="TransportMW — Malawi's Ride Hub" />
    <meta property="og:description" content="Find trusted taxis, motorcycles, hire cars & minibuses across Malawi. Book instantly — no account needed." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:url" content="https://transportmw.com" />
    <meta property="og:locale" content="en_MW" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TransportMW — Malawi's Ride Hub" />
    <meta name="twitter:description" content="Book taxis, motorcycles, hire cars across Malawi instantly." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TransportMW",
      "description": "Malawi's trusted transport booking platform",
      "url": "https://transportmw.com",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "Any",
      "offers": {"@type": "Offer", "price": "0", "priceCurrency": "MWK"},
      "areaServed": {"@type": "Country", "name": "Malawi"}
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet" />

    <style>
      html, body { overscroll-behavior: none; background: #0a1628; }
      #root { min-height: 100dvh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
