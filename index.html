    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet" />

    <style>
      html, body {
        overscroll-behavior: none;
        background: #0d1f3c;
        margin: 0; padding: 0;
      }
      #root { min-height: 100dvh; }

      /* ═══════════════════════════════════════════
         GPS PIN LOADING SCREEN
      ═══════════════════════════════════════════ */
      #pwa-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f0f4f8;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        overflow: hidden;
        opacity: 1;
        transition: opacity 0.4s ease;
      }
      #pwa-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      /* ── Map background ── */
      .sp-map {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      /* ── Map grid lines ── */
      .sp-map-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(45,212,191,0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(45,212,191,0.08) 1px, transparent 1px);
        background-size: 48px 48px;
      }

      /* ── Map road shapes ── */
      .sp-map-svg {
        position: absolute;
        inset: 0;
        width: 100%; height: 100%;
      }

      /* ── Route line drawing itself ── */
      @keyframes routeDraw {
        from { stroke-dashoffset: 600; }
        to   { stroke-dashoffset: 0; }
      }
      .sp-route {
        fill: none;
        stroke: #2dd4bf;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 600;
        animation: routeDraw 1.4s ease 0.2s both;
      }
      .sp-route-bg {
        fill: none;
        stroke: rgba(45,212,191,0.15);
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ── Map location labels ── */
      @keyframes labelPop {
        0%   { transform: scale(0) translateY(4px); opacity: 0; }
        65%  { transform: scale(1.1) translateY(-1px); opacity: 1; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }
      .sp-map-label {
        position: absolute;
        background: #fff;
        border: 1.5px solid #2dd4bf;
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 10px;
        font-weight: 700;
        color: #0f6e56;
        white-space: nowrap;
        transform-origin: center bottom;
        animation: labelPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      .sp-label-a { top: 22%; left: 10%; animation-delay: 1.0s; }
      .sp-label-b { bottom: 28%; right: 8%; animation-delay: 1.8s; }

      /* ── Centre content ── */
      .sp-center {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        z-index: 2;
      }

      /* ── GPS Pin ── */
      @keyframes pinDrop {
        0%   { transform: translateY(-90px) scale(0.5); opacity: 0; }
        55%  { transform: translateY(10px) scale(1.08); opacity: 1; }
        72%  { transform: translateY(-5px) scale(0.97); }
        84%  { transform: translateY(4px) scale(1.02); }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      @keyframes pinPulse {
        0%,100% { transform: scale(1); }
        50%      { transform: scale(1.06); }
      }
      .sp-pin-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: pinDrop 0.65s cubic-bezier(0.22,0.61,0.36,1) 0.1s both;
      }
      .sp-pin-svg {
        animation: pinPulse 2s ease-in-out 0.85s infinite;
        filter: drop-shadow(0 8px 20px rgba(45,212,191,0.35));
      }
      .sp-pin-tail {
        width: 3px;
        height: 10px;
        background: #2dd4bf;
        border-radius: 0 0 3px 3px;
        margin-top: -1px;
      }

      /* ── Shadow under pin ── */
      @keyframes shadowScale {
        0%,100% { transform: scaleX(1); opacity: 0.2; }
        50%      { transform: scaleX(1.15); opacity: 0.12; }
      }
      .sp-pin-shadow {
        width: 22px; height: 6px;
        background: rgba(0,0,0,0.22);
        border-radius: 50%;
        margin-top: 1px;
        animation: shadowScale 2s ease-in-out 0.85s infinite;
      }

      /* ── Ripple rings ── */
      @keyframes rippleOut {
        0%   { transform: scale(0.3); opacity: 0.7; }
        100% { transform: scale(2.6); opacity: 0; }
      }
      .sp-ripples {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 30px; height: 12px;
        pointer-events: none;
      }
      .sp-ripple {
        position: absolute;
        inset: 0;
        border: 2px solid #2dd4bf;
        border-radius: 50%;
        animation: rippleOut 1.6s ease-out 0.85s infinite;
        opacity: 0;
      }
      .sp-ripple:nth-child(2) { animation-delay: 1.25s; }

      /* ── Brand row ── */
      @keyframes spFadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .sp-brand {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-top: 20px;
        animation: spFadeUp 0.4s ease 0.7s both;
      }
      .sp-brand-icon {
        width: 34px; height: 34px;
        background: #2dd4bf;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; font-weight: 800;
        color: #fff;
      }
      .sp-brand-name {
        font-size: 18px; font-weight: 800;
        color: #0d1f3c; letter-spacing: -0.3px;
      }

      /* ── Status text ── */
      .sp-status {
        font-size: 12px; font-weight: 500;
        color: #64748b;
        margin-top: 6px;
        min-height: 18px;
        animation: spFadeUp 0.4s ease 0.85s both;
        transition: opacity 0.18s ease;
        letter-spacing: 0.2px;
      }

      /* ── Three loading dots (T-style wave) ── */
      @keyframes dotWave {
        0%,60%,100% { transform: translateY(0); opacity: 0.3; }
        30%          { transform: translateY(-7px); opacity: 1; }
      }
      .sp-loading-dots {
        display: flex;
        gap: 7px;
        margin-top: 14px;
        animation: spFadeUp 0.4s ease 0.95s both;
      }
      .sp-ld {
        width: 9px; height: 9px;
        background: #2dd4bf;
        border-radius: 50%;
        animation: dotWave 0.9s ease-in-out infinite;
      }
      .sp-ld:nth-child(1) { animation-delay: 0.0s; }
      .sp-ld:nth-child(2) { animation-delay: 0.15s; }
      .sp-ld:nth-child(3) { animation-delay: 0.30s; }

      /* ── Powered by ── */
      .sp-powered {
        position: absolute;
        bottom: 20px;
        left: 0; right: 0;
        text-align: center;
        font-size: 11px;
        color: rgba(13,31,60,0.3);
        letter-spacing: 0.4px;
        animation: spFadeUp 0.4s ease 1.0s both;
      }
      .sp-powered b { color: #2dd4bf; font-weight: 700; }
    </style>
  </head>
  <body>

    <!-- PWA SPLASH — GPS Pin Loading Screen -->
    <div id="pwa-splash">

      <!-- Map background -->
      <div class="sp-map">
        <div class="sp-map-grid"></div>
        <svg class="sp-map-svg" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <!-- Background road blocks -->
          <rect x="0"   y="120" width="120" height="55" rx="6" fill="rgba(45,212,191,0.06)"/>
          <rect x="140" y="60"  width="80"  height="90" rx="6" fill="rgba(45,212,191,0.06)"/>
          <rect x="260" y="100" width="110" height="65" rx="6" fill="rgba(45,212,191,0.06)"/>
          <rect x="30"  y="300" width="100" height="70" rx="6" fill="rgba(45,212,191,0.06)"/>
          <rect x="220" y="280" width="130" height="55" rx="6" fill="rgba(45,212,191,0.06)"/>
          <rect x="60"  y="500" width="90"  height="80" rx="6" fill="rgba(45,212,191,0.06)"/>
          <rect x="240" y="480" width="110" height="60" rx="6" fill="rgba(45,212,191,0.06)"/>
          <rect x="10"  y="650" width="140" height="55" rx="6" fill="rgba(45,212,191,0.06)"/>
          <rect x="260" y="620" width="120" height="70" rx="6" fill="rgba(45,212,191,0.06)"/>
          <!-- Route background glow -->
          <path class="sp-route-bg" d="M 70 680 Q 90 580 130 500 Q 170 420 200 380 Q 230 340 250 300 Q 280 240 300 180"/>
          <!-- Route line drawing itself -->
          <path class="sp-route"    d="M 70 680 Q 90 580 130 500 Q 170 420 200 380 Q 230 340 250 300 Q 280 240 300 180"/>
          <!-- Start dot -->
          <circle cx="70" cy="680" r="6" fill="#2dd4bf" opacity="0.9"/>
          <circle cx="70" cy="680" r="11" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.4"/>
          <!-- End dot -->
          <circle cx="300" cy="180" r="6" fill="#2dd4bf" opacity="0.9"/>
          <circle cx="300" cy="180" r="11" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.4"/>
        </svg>
      </div>

      <!-- Location labels -->
      <div class="sp-map-label sp-label-a">Pickup</div>
      <div class="sp-map-label sp-label-b">Drop-off</div>

      <!-- Centre: GPS pin + brand + dots -->
      <div class="sp-center">

        <!-- GPS Pin -->
        <div style="position:relative;">
          <div class="sp-pin-wrap">
            <svg class="sp-pin-svg" width="72" height="82" viewBox="0 0 72 82" xmlns="http://www.w3.org/2000/svg">
              <!-- Outer glow ring -->
              <circle cx="36" cy="34" r="33" fill="rgba(45,212,191,0.12)"/>
              <!-- Pin circle -->
              <circle cx="36" cy="34" r="28" fill="#2dd4bf"/>
              <!-- Inner white circle -->
              <circle cx="36" cy="34" r="20" fill="rgba(255,255,255,0.18)"/>
              <!-- T letter -->
              <text x="36" y="42" text-anchor="middle" fill="#ffffff"
                    font-size="26" font-weight="900" font-family="Inter,sans-serif"
                    letter-spacing="-1">T</text>
              <!-- Pin tail -->
              <polygon points="28,58 44,58 36,74" fill="#2dd4bf"/>
            </svg>
          </div>
          <!-- Ripples -->
          <div class="sp-ripples">
            <div class="sp-ripple"></div>
            <div class="sp-ripple"></div>
          </div>
        </div>

        <!-- Shadow -->
        <div class="sp-pin-shadow"></div>

        <!-- Brand name -->
        <div class="sp-brand">
          <div class="sp-brand-name">TransportMW</div>
        </div>

        <!-- Status text -->
        <div class="sp-status" id="sp-status">Finding your ride…</div>

        <!-- Three bouncing dots -->
        <div class="sp-loading-dots">
          <div class="sp-ld"></div>
          <div class="sp-ld"></div>
          <div class="sp-ld"></div>
        </div>

      </div>

      <!-- Powered by Otechy -->
      <div class="sp-powered">Powered by <b>Otechy</b></div>

    </div><!-- /#pwa-splash -->

    <div id="root"></div>

    <script>
    (function () {
      var isStandalone =
        window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;

      if (!isStandalone) return;

      var splash  = document.getElementById('pwa-splash');
      var statusEl = document.getElementById('sp-status');

      splash.style.display = 'flex';

      /* Status messages timed across 3 seconds total */
      var steps = [
        { ms: 0,    text: 'Finding your ride\u2026' },
        { ms: 900,  text: 'Locating drivers nearby\u2026' },
        { ms: 1900, text: 'Almost ready\u2026' },
        { ms: 2700, text: 'Let\u2019s go!' }
      ];

      steps.forEach(function(step) {
        setTimeout(function() {
          statusEl.style.opacity = '0';
          setTimeout(function() {
            statusEl.textContent = step.text;
            statusEl.style.opacity = '1';
          }, 120);
        }, step.ms);
      });

      /* Fade out at exactly 3 seconds */
      setTimeout(function () {
        splash.classList.add('fade-out');
        setTimeout(function () {
          splash.style.display = 'none';
        }, 420);
      }, 3000);
    })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
